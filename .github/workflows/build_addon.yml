name: Test BraillePlus pull requests

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Check and build BraillePlus
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install pre-commit scons markdown
          sudo apt-get update
          sudo apt-get install --yes gettext

      - name: Run code checks
        env:
          SKIP: no-commit-to-branch
        run: pre-commit run --all-files

      - name: Build BraillePlus
        run: |
          scons
          scons pot

      - name: Upload temporary test build
        uses: actions/upload-artifact@v6
        with:
          name: BraillePlus-pull-request-build
          path: |
            ./*.nvda-addon
            ./*.pot
          if-no-files-found: error
          retention-days: 7
